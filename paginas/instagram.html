<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            font-family: Verdana, Geneva, Tahoma, sans-serif;
        }
        ::-webkit-scrollbar {
            width: 0;
            height: 0;
        }
        img {
            width: 100vw;
            
        }
        a {
            display: block;
            background-color: darkred;
            color: white;
            text-align: center;
            text-decoration: none;
            font-weight: bold;
            padding: 10px;
            font-size: 1.3em;
        }
        a:hover {
            background-image: linear-gradient(to right, orange, red,  purple, darkblue);
        }
    </style>
</head>
<body>
    <img src="../imagens/tela-instagram.jpg" alt="imagem do instagram do gustavo guanabara">
    <a href="https://www.instagram.com/gustavoguanabara">Acesse aqui</a>
</body>
</html>
